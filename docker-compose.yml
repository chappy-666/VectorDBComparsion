services:
  # -------------------------------------------------------
  # フロントエンド + APIプロキシ（Next.js）
  # -------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - app-network

  # -------------------------------------------------------
  # バックエンド（Python + LangGraph）
  # -------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - .:/workspace
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - PGVECTOR_HOST=pgvector
      - PGVECTOR_PORT=5432
      - PGVECTOR_USER=postgres
      - PGVECTOR_PASSWORD=postgres
      - PGVECTOR_DB=vectordb
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_started
      pgvector:
        condition: service_healthy
    networks:
      - app-network

  # -------------------------------------------------------
  # ローカルLLM（Ollama）
  # -------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./volumes/ollama:/root/.ollama
    networks:
      - app-network

  # -------------------------------------------------------
  # ベクトルDB① Qdrant
  # -------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    networks:
      - app-network

  # -------------------------------------------------------
  # ベクトルDB② PostgreSQL + pgvector
  # -------------------------------------------------------
  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vectordb
    volumes:
      - ./volumes/pgvector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
